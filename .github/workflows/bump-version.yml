name: bump-version

on:
  push:
    branches: [main]
    paths-ignore:
      - VERSION
      - postcar_check.py

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump version
        run: python scripts/bump_version.py

      - name: Commit new version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION postcar_check.py
          git diff --cached --quiet || git commit -m "chore: bump version to $(cat VERSION)"

      - name: Push
        run: git push
